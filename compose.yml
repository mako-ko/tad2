services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tad2
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - tad2_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
    command: npm run dev

volumes:
  tad2_node_modules:
